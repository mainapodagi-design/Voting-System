<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWU Student Registration</title>

    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay"></div>

<div class="main-container">

    <!-- Left Side Branding -->
    <div class="left-panel">
        <h1>Morobe Tutumang Students Association DWU</h1>
        <p>Create your student account to access the voting system.</p>
    </div>

    <!-- Form -->
    <div class="form-panel">
        <form id="registerForm">

            <h2>Create Account</h2>

            <div class="grid">

                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" id="firstname" placeholder="First Name" required>
                </div>

                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" id="middlename" placeholder="Middle Name">
                </div>

                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" id="lastname" placeholder="Last Name" required>
                </div>

                <div class="input-group">
                    <i class="fa fa-id-card"></i>
                    <input type="text" id="studentID" placeholder="Student ID" required>
                </div>

                <div class="input-group full">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="email" placeholder="Auto-generated email" readonly>
                </div>

                <div class="input-group">
                    <i class="fa fa-building"></i>
                    <select id="faculty" required>
                        <option value="">Select Faculty</option>
                        <option>Faculty of Business</option>
                        <option>Faculty of IT</option>
                        <option>Faculty of Health Sciences</option>
                        <option>Faculty of Education</option>
                    </select>
                </div>

                <div class="input-group">
                    <i class="fa fa-book"></i>
                    <select id="course" required>
                        <option value="">Select Course</option>
                        <option>Computer Science</option>
                        <option>Accounting</option>
                        <option>Nursing</option>
                        <option>Education</option>
                    </select>
                </div>

                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>

            </div>

            <button type="submit">Create Account</button>

            <p id="message"></p>

        </form>
    </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
